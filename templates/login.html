<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Edu-Portal - Login</title> 
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='imagenes/educacion2.png') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * { font-family: 'Poppins', sans-serif; }
        body { margin: 0; height: 100vh; display: flex; }

        .left-panel {
            flex: 1;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }

        .left-panel h1 { font-weight: 700; font-size: 45px; }
        .left-panel p { font-weight: 300; font-size: 18px; margin-top: 20px; text-align: center; }

        .right-panel {
            flex: 1;
            background: #f4f6f9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 400px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.8s ease-in-out;
        }

        .login-title { font-weight: 600; margin-bottom: 25px; color: #2a5298; }
        .form-control { border-radius: 12px; padding: 12px; }
        .btn-login {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 500;
            transition: 0.3s;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(42, 82, 152, 0.4); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 992px) { .left-panel { display: none; } }
    </style>
</head>

<body>
    <div class="left-panel">
        <div class="logo-container mb-4">
            <img src="{{ url_for('static', filename='imagenes/educacion2.png') }}" alt="Logo" width="200">
        </div>
        <h1>Edu-Portal</h1>
        <p>Plataforma integral de gestión académica.<br>Administra clases, estudiantes y docentes desde un solo lugar.</p>
    </div>

    <div class="right-panel">
        <div class="login-card">
            <h4 class="login-title text-center">Iniciar Sesión</h4>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="alert alert-danger border-0 small py-2 mb-3" role="alert" style="border-radius: 10px;">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ message }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Correo Electrónico</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" name="correo" class="form-control" placeholder="ejemplo@correo.edu" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" id="password" name="password" class="form-control" placeholder="Ingrese su contraseña" required>
                        <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-login text-white">Ingresar al Sistema</button>
                </div>
            </form>

            <div class="text-center mt-4 text-muted small">© 2026 Edu-Portal</div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById("password");
            passwordInput.type = passwordInput.type === "password" ? "text" : "password";
        }
    </script>
</body>
</html>
