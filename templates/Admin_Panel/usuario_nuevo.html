{% extends 'base.html' %}
{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<div class="viewport-wrapper">
    <div class="container main-content-box">
        
        <div class="top-action-bar">
            <a href="{{ url_for('admin_dashboard') }}" class="chip-logout">
                <i class="bi bi-arrow-left" style="margin-right: 7px;"></i>Volver al Panel
            </a>
        </div>

        <header class="header-minimal">
            <div class="logo-container">
                <i class="bi bi-person-plus-fill" style="font-size: 2rem; color: var(--primary);"></i>
            </div>
            <h1 class="main-title">Nuevo {{ rol_nombre }}</h1>
            <div class="badge-group">
                <span class="chip-glass">
                    <i class="bi bi-info-circle" style="margin-right: 5px;"></i>Completar Registro
                </span>
            </div>
        </header>

        <div class="m-card" style="max-width: 750px; margin: 0 auto;">
            <div class="m-card-body">
                <form action="{{ url_for('crear_usuario_logica') }}" method="POST">
                    <input type="hidden" name="id_rol" value="{{ id_rol }}">
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
                        <div>
                            <label class="m-label">Nombre</label>
                            <input type="text" name="nombre" class="m-input" required placeholder="Ej. Juan">
                        </div>
                        <div>
                            <label class="m-label">Apellido</label>
                            <input type="text" name="apellido" class="m-input" required placeholder="Ej. Pérez">
                        </div>
                    </div>
                    
                    <div style="margin-bottom: 1.5rem;">
                        <label class="m-label">Correo Electrónico</label>
                        <input type="email" name="correo" class="m-input" required placeholder="juan@ejemplo.com">
                    </div>
                    
                    <div style="margin-bottom: 2rem;">
                        <label class="m-label">Contraseña Temporal</label>
                        <input type="password" name="password" class="m-input" required placeholder="••••••••">
                    </div>

                    {% if id_rol == 2 %}
                        <div style="margin-bottom: 2rem;">
                            <label class="m-label">Especialidad Docente</label>
                            <input type="text" name="especialidad" class="m-input" placeholder="Ej. Matemáticas, Ciencias...">
                        </div>
                    {% elif id_rol == 3 %}
                        <div style="margin-bottom: 2rem;">
                            <label class="m-label">Número de Carnet Estudiantil</label>
                            <input type="text" name="carnet" class="m-input" placeholder="Ej. 2026-0001">
                        </div>
                    {% endif %}

                    <div class="m-card-footer" style="justify-content: center; margin-top: 1rem;">
                        <button type="submit" class="m-btn m-btn-primary w-100" style="padding: 15px; font-size: 1rem;">
                            <i class="bi bi-check-circle-fill" style="margin-right: 3px;"></i> Guardar {{ rol_nombre }}
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <footer class="footer-simple">
            <p>© 2026 Edu-Portal • Conectado de forma segura</p>
        </footer>
    </div>
</div>

<style>
    :root {
        --primary: #4318ff;
        --dark: #2b3674;
        --muted: #a3aed0;
        --bg: #f4f7fe;
    }

    body, html { height: 100%; margin: 0; }

    .viewport-wrapper {
        min-height: 100vh; background-color: var(--bg); display: flex; align-items: center;
        justify-content: center; font-family: 'Plus Jakarta Sans', sans-serif; padding: 20px;
    }

    .main-content-box { max-width: 950px; width: 100%; text-align: center; position: relative; }

    .top-action-bar { display: flex; justify-content: flex-end; margin-bottom: -10px; width: 100%; }
    
    .chip-logout {
        background: white; padding: 8px 18px; border-radius: 12px; font-size: 0.8rem;
        font-weight: 700; color: #475569; text-decoration: none; transition: 0.3s;
        display: flex; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.02);
    }
    .chip-logout:hover { 
        background: #fee2e2; 
        color: #ef4444; 
        transform: translateY(-2px); 
    }

    .header-minimal { margin-bottom: 2.5rem; }
    .logo-container {
        width: 70px; height: 70px; background: white; border-radius: 20px;
        margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    .main-title { font-weight: 800; font-size: 2.2rem; color: var(--dark); letter-spacing: -1px; }
    .badge-group { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
    .chip-glass { background: white; padding: 6px 15px; border-radius: 10px; font-size: 0.8rem; font-weight: 700; color: var(--dark); box-shadow: 0 4px 10px rgba(0,0,0,0.03); }

    .m-card {
        background: white; padding: 3rem; border-radius: 24px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid transparent;
        text-align: left;
    }

    .m-btn { flex: 1; border: none; cursor: pointer; padding: 12px; border-radius: 12px; font-weight: 700; text-decoration: none; text-align: center; transition: 0.2s; }
    .m-btn-primary { background: var(--dark); color: white; }
    .m-btn-primary:hover { background: var(--primary); box-shadow: 0 10px 20px rgba(67, 24, 255, 0.2); transform: translateY(-3px); }

    .footer-simple { margin-top: 3rem; color: var(--muted); font-size: 0.8rem; font-weight: 600; text-align: center; }

    .m-label {
        display: block; font-weight: 800; color: var(--dark); margin-bottom: 8px; font-size: 0.9rem;
    }
    .m-input {
        width: 100%; padding: 14px 18px; border-radius: 14px; background-color: var(--bg);
        border: 2px solid transparent; color: var(--dark); font-family: inherit; font-weight: 600;
        transition: all 0.3s ease; box-sizing: border-box; font-size: 0.95rem;
    }
    .m-input::placeholder { color: var(--muted); font-weight: 500; }
    .m-input:focus {
        outline: none; border-color: var(--primary); background-color: white;
        box-shadow: 0 10px 20px rgba(67, 24, 255, 0.05);
    }

    @media (max-width: 768px) {
        .m-card { padding: 1.5rem; }
        .top-action-bar { justify-content: center; margin-bottom: 10px; }
        div[style*="display: grid"] { grid-template-columns: 1fr !important; }
    }
</style>

{% endblock %}
