            <div>
                <h3 class="m-section-title" style="margin-bottom: 6px;" id="horarioMobileTitulo">Horario por grado</h3>
                <p class="text-muted" id="horarioMobileSubtitulo" style="margin: 0;">Vista rapida del horario por seccion.</p>
            </div>
            <button type="button" onclick="cerrarHorarioMobile()" class="btn-icon" style="background: var(--bg); color: var(--dark);">

            </button>
        </div>

        <div class="horario-mobile-tabs" id="horarioMobileTabs"></div>

        <div class="horario-mobile-body">
            <div class="horario-mobile-grid-shell">
                <div id="horarioMobileGrid" class="horario-editor-grid"></div>

        <div class="horario-mobile-footer">
