{% extends 'base.html' %}
{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<div class="viewport-wrapper">
    <div class="container main-content-box" style="max-width: 700px;">
        
        <div class="top-action-bar">
            <a href="{{ url_for('gestion_usuarios') }}" class="chip-back">
                <i class="bi bi-arrow-left" style="margin-right: 7px;"></i>Cancelar y Volver
            </a>
        </div>

        <header class="header-minimal">
            <div class="logo-container">
                <i class="bi bi-pencil-square" style="font-size: 2.2rem; color: var(--primary);"></i>
            </div>
            <h1 class="main-title">Editar Perfil</h1>
            <div class="badge-group">
                <span class="chip-glass">
                    <i class="bi bi-shield-check" style="margin-right: 5px;"></i>
                    Modificando a: {{ usuario.nombre }} {{ usuario.apellido }}
                </span>
            </div>
        </header>

        <div class="m-card">
            <form method="POST" action="{{ url_for('editar_usuario', id_usuario=usuario.id_usuario) }}" class="edit-form">
                
                <div class="form-section-title">Información General</div>
                
                <div class="grid-inputs">
                    <div class="input-group">
                        <label class="m-label">Nombre(s)</label>
                        <input type="text" name="nombre" class="m-input" value="{{ usuario.nombre }}" required>
                    </div>
                    
                    <div class="input-group">
                        <label class="m-label">Apellido(s)</label>
                        <input type="text" name="apellido" class="m-input" value="{{ usuario.apellido }}" required>
                    </div>
                </div>

                <div class="input-group" style="margin-top: 1.5rem;">
                    <label class="m-label">Correo Electrónico</label>
                    <div class="input-with-icon">
                        <i class="bi bi-envelope"></i>
                        <input type="email" name="correo" class="m-input" value="{{ usuario.correo }}" required>
                    </div>
                </div>

                <hr class="form-divider">

                <div class="form-section-title">Datos Específicos del Rol</div>

                {% if usuario.id_rol == 2 %} <div class="input-group">
                    <label class="m-label">Especialidad Docente</label>
                    <div class="input-with-icon">
                        <i class="bi bi-bookmark-star"></i>
                        <input type="text" name="especialidad" class="m-input" 
                               value="{{ usuario.maestro_perfil.especialidad if usuario.maestro_perfil else '' }}" required>
                    </div>
                </div>
                {% elif usuario.id_rol == 3 %} <div class="input-group">
                    <label class="m-label">Número de Carnet</label>
                    <div class="input-with-icon">
                        <i class="bi bi-card-text"></i>
                        <input type="text" name="carnet" class="m-input" 
                               value="{{ usuario.alumno_perfil.carnet if usuario.alumno_perfil else '' }}" required>
                    </div>
                </div>
                {% endif %}

                <div class="actions-container">
                    <button type="submit" class="m-btn-save">
                        <i class="bi bi-check2-circle"></i> Guardar Cambios
                    </button>
                </div>

            </form>
        </div>

    </div>
</div>

<style>
    :root {
        --primary: #4318ff;
        --dark: #2b3674;
        --muted: #a3aed0;
        --bg: #f4f7fe;
        --accent-green: #059669;
        --danger: #ef4444;
    }

    body { background-color: var(--bg); margin: 0; }
    .viewport-wrapper { min-height: 100vh; padding: 40px 20px; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; }
    .main-content-box { width: 100%; margin: 0 auto; animation: fadeIn 0.6s ease; }

    /* Header & Back */
    .top-action-bar { display: flex; justify-content: flex-start; margin-bottom: 20px; }
    .chip-back { background: white; padding: 10px 18px; border-radius: 12px; font-size: 0.85rem; font-weight: 700; color: var(--muted); text-decoration: none; transition: 0.3s; display: flex; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
    .chip-back:hover { color: var(--danger); background: #fee2e2; transform: translateX(-5px); }

    .header-minimal { text-align: center; margin-bottom: 2.5rem; }
    .logo-container { width: 75px; height: 75px; background: white; border-radius: 22px; margin: 0 auto 1.2rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 12px 30px rgba(0,0,0,0.04); }
    .main-title { font-weight: 800; font-size: 2.2rem; color: var(--dark); letter-spacing: -1px; margin: 0; }
    .chip-glass { background: white; padding: 8px 16px; border-radius: 10px; font-size: 0.8rem; font-weight: 700; color: var(--primary); display: inline-block; margin-top: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }

    /* Card del Formulario */
    .m-card { background: white; padding: 3rem; border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.03); border: 1px solid rgba(255,255,255,0.8); }
    .form-section-title { font-weight: 800; color: var(--dark); font-size: 1.1rem; margin-bottom: 1.5rem; display: flex; align-items: center; }
    .form-divider { border: none; border-top: 1px solid #edf2f7; margin: 2.5rem 0; }

    /* Inputs */
    .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .input-group { display: flex; flex-direction: column; gap: 8px; }
    .m-label { font-weight: 700; color: var(--dark); font-size: 0.85rem; margin-left: 5px; }
    
    .m-input { width: 100%; padding: 14px 18px; border-radius: 16px; background-color: var(--bg); border: 2px solid transparent; color: var(--dark); font-weight: 600; font-family: inherit; transition: 0.3s; box-sizing: border-box; }
    .m-input:focus { outline: none; border-color: var(--primary); background-color: white; box-shadow: 0 10px 20px rgba(67, 24, 255, 0.05); }

    .input-with-icon { position: relative; }
    .input-with-icon i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 1.1rem; }
    .input-with-icon .m-input { padding-left: 50px; }

    /* Botón Guardar */
    .actions-container { margin-top: 3rem; }
    .m-btn-save { width: 100%; padding: 16px; border-radius: 18px; border: none; background: var(--primary); color: white; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.4s; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 10px 25px rgba(67, 24, 255, 0.2); }
    .m-btn-save:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(67, 24, 255, 0.3); background: #3311cc; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 600px) {
        .grid-inputs { grid-template-columns: 1fr; }
        .m-card { padding: 2rem; }
    }
</style>

{% endblock %}
