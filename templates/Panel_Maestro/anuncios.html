{% extends 'base.html' %}
{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<style>
    :root {
        --primary-blue: #3b82f6;
        --danger-main: #ef4444;
        --danger-soft: #fef2f2;
        --dark-text: #0f172a;
        --muted-text: #64748b;
        --border-color: #e2e8f0;
        --bg-soft: #f8fafc;
        --card-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
    }

    body { background-color: var(--bg-soft); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--dark-text); }
    .viewport-container { padding: 40px 20px; max-width: 900px; margin: 0 auto; }
    .top-bar { display: flex; align-items: center; gap: 20px; margin-bottom: 35px; }
    .btn-back-circle {
        width: 48px; height: 48px; background: white; border-radius: 14px;
        display: flex; align-items: center; justify-content: center;
        color: var(--muted-text); text-decoration: none; border: 1px solid var(--border-color);
        transition: all 0.2s ease; font-size: 1.2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    .btn-back-circle:hover { background: white; color: var(--dark-text); transform: translateX(-4px); border-color: #cbd5e1; }
    .header-text h1 { font-weight: 800; margin: 0; font-size: 1.8rem; letter-spacing: -0.5px; }
    .header-text p { color: var(--muted-text); margin: 4px 0 0 0; font-weight: 500; font-size: 0.95rem; }
    .form-card {
        background: white; border-radius: 24px; box-shadow: var(--card-shadow);
        padding: 35px; border: 1px solid rgba(255,255,255,0.5);
    }
    .form-group { margin-bottom: 24px; }
    .form-label { font-weight: 700; color: var(--dark-text); display: block; margin-bottom: 10px; font-size: 0.95rem; }
    .form-control {
        width: 100%; padding: 14px 18px; border-radius: 14px; border: 2px solid var(--border-color);
        background: var(--bg-soft); color: var(--dark-text); font-family: inherit;
        font-size: 1rem; transition: all 0.2s ease; box-sizing: border-box;
    }
    .form-control:focus { border-color: var(--danger-main); background: white; outline: none; box-shadow: 0 0 0 4px var(--danger-soft); }
    textarea.form-control { resize: vertical; min-height: 140px; line-height: 1.5; }
    .btn-submit {
        background: var(--danger-main); color: white; border: none; width: 100%;
        padding: 16px; border-radius: 14px; font-weight: 800; font-size: 1.05rem;
        display: flex; align-items: center; justify-content: center; gap: 10px;
        transition: 0.3s; cursor: pointer; margin-top: 10px;
    }
    .btn-submit:hover { background: #dc2626; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(239, 68, 68, 0.25); }
</style>

<div class="viewport-container">
    <div class="top-bar">
        <a href="javascript:history.back()" class="btn-back-circle" title="Volver">
            <i class="bi bi-arrow-left"></i>
        </a>
        <div class="header-text">
            <h1>Panel de <span style="color: var(--danger-main);">Anuncios</span></h1>
            <p>Publica comunicados para <strong>{{ grado.nombre_grado }}</strong></p>
        </div>
    </div>

    <div class="form-card">
        <form action="{{ url_for('maestro_anuncios', id_grado=grado.id_grado) }}" method="POST">
            <div class="form-group">
                <label class="form-label" for="titulo">Titulo del Anuncio</label>
                <input type="text" id="titulo" name="titulo" class="form-control" placeholder="Ej: Recordatorio de examen parcial..." required>
            </div>

            <div class="form-group">
                <label class="form-label" for="id_clase">Materia Relacionada</label>
                <select id="id_clase" name="id_clase" class="form-control">
                    <option value="">Todo el grado</option>
                    {% for clase in clases %}
                    <option value="{{ clase.id_clase }}">{{ clase.nombre_clase }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="mensaje">Mensaje</label>
                <textarea id="mensaje" name="mensaje" class="form-control" placeholder="Escribe aqui las instrucciones o el comunicado para los estudiantes..." required></textarea>
            </div>

            <button type="submit" class="btn-submit">
                <i class="bi bi-megaphone-fill"></i> Publicar Anuncio
            </button>
        </form>
    </div>
</div>

{% endblock %}
