{% extends 'base.html' %}
{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<style>
    :root {
        --success-main: #10b981;
        --success-light: #d1fae5;
        --success-dark: #065f46;
        --dark-text: #1e293b;
        --muted-text: #64748b;
        --bg-soft: #f8fafc;
        --card-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
    }

    body { 
        background-color: var(--bg-soft); 
        font-family: 'Plus Jakarta Sans', sans-serif; 
        color: var(--dark-text);
        letter-spacing: -0.01em;
    }

    .viewport-container { padding: 60px 0; }

    .header-section { text-align: center; margin-bottom: 3.5rem; position: relative; }
    
    .btn-back-top {
        position: absolute; left: 0; top: 10px;
        display: flex; align-items: center; gap: 8px;
        color: var(--dark-text); font-weight: 700; text-decoration: none;
        transition: 0.3s; font-size: 0.9rem;
        background: white; padding: 10px 18px; border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.02);
    }
    .btn-back-top:hover { color: var(--success-main); transform: translateX(-5px); }

    .form-card {
        background: white; border-radius: 32px; padding: 3.5rem;
        box-shadow: var(--card-shadow); border: 1px solid #ffffff;
        max-width: 680px; margin: 0 auto;
        box-sizing: border-box;
    }

    .card-header-custom { text-align: center; margin-bottom: 3rem; }

    .icon-box {
        width: 64px; height: 64px; background: var(--success-light); color: var(--success-main);
        border-radius: 20px; display: flex; align-items: center; justify-content: center;
        margin: 0 auto 1.2rem; font-size: 1.6rem;
    }

    .form-group-spaced { margin-bottom: 2rem; width: 100%; }

    .form-label {
        font-weight: 700; font-size: 0.75rem; color: var(--dark-text);
        margin-bottom: 10px; display: block; text-transform: uppercase; letter-spacing: 1px;
    }

    .input-wrapper { position: relative; width: 100%; box-sizing: border-box; }
    
    .input-wrapper i {
        position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
        color: var(--muted-text); font-size: 1.1rem; transition: 0.3s;
        z-index: 2;
    }

    .custom-input, .form-select {
        border-radius: 16px; 
        border: 2px solid #f1f5f9; 
        padding: 14px 18px 14px 50px; 
        font-family: inherit; 
        transition: 0.3s; 
        font-size: 0.95rem; 
        color: var(--dark-text);
        background-color: #f8fafc; 
        width: 100%; 
        display: block;
        box-sizing: border-box;
    }

    .custom-input:focus, .form-select:focus {
        border-color: var(--success-main); 
        box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        outline: none; background: #fff;
    }

    /* Estilo para textarea */
    textarea.custom-input { padding-top: 15px; min-height: 120px; }
    .input-wrapper textarea + i { top: 25px; transform: none; }

    .btn-group-flex { display: flex; gap: 15px; margin-top: 3rem; }
    
    .m-btn {
        padding: 15px 28px; border-radius: 16px; font-weight: 700;
        font-size: 0.95rem; transition: 0.4s; text-decoration: none;
        display: inline-flex; align-items: center; justify-content: center; border: none; flex: 1;
    }
    
    .m-btn-success { background: var(--success-main); color: white; cursor: pointer; }
    .m-btn-outline { background: #f1f5f9; color: var(--muted-text); }

    @media (max-width: 768px) {
        .form-card { padding: 2.5rem 1.5rem; }
        .btn-back-top { position: relative; margin-bottom: 2rem; display: inline-flex; }
        .btn-group-flex { flex-direction: column-reverse; }
    }
</style>

<div class="viewport-container">
    <div class="container">
        
        <header class="header-section">
            <a href="{{ url_for('maestro_dashboard') }}" class="btn-back-top">
                <i class="bi bi-chevron-left"></i> Volver al Inicio
            </a>
            <h1 class="fw-800 mb-2" style="font-size: 2.2rem;">Nueva <span class="text-success">Asignación</span></h1>
            <p class="text-muted fw-600 small">Planifica y publica actividades académicas para tus estudiantes</p>
        </header>

        <div class="form-card">
            <div class="card-header-custom">
                <div class="icon-box">
                    <i class="bi bi-journal-text"></i>
                </div>
                <h4 class="fw-800 m-0 text-dark">Editor de Tarea</h4>
            </div>

            <form action="{{ url_for('crear_tarea') }}" method="POST">
                
                <div class="form-group-spaced">
                    <label class="form-label">Asignatura</label>
                    <div class="input-wrapper">
                        <i class="bi bi-bookmark-star"></i>
                        <select name="id_clase" class="form-select" required>
                            <option value="" disabled selected>Selecciona la materia...</option>
                            {% for clase in clases %}
                                <option value="{{ clase.IdClase }}">{{ clase.NombreClase }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="form-group-spaced">
                    <label class="form-label">Título de la actividad</label>
                    <div class="input-wrapper">
                        <i class="bi bi-type"></i>
                        <input type="text" name="titulo" class="custom-input" placeholder="Ej: Ensayo sobre el clima" required>
                    </div>
                </div>

                <div class="form-group-spaced">
                    <label class="form-label">Instrucciones detalladas</label>
                    <div class="input-wrapper">
                        <i class="bi bi-card-text"></i>
                        <textarea name="descripcion" class="custom-input" placeholder="Describe los pasos a seguir..."></textarea>
                    </div>
                </div>

                <div class="form-group-spaced">
                    <label class="form-label">Plazo de entrega</label>
                    <div class="input-wrapper">
                        <i class="bi bi-calendar-event"></i>
                        <input type="datetime-local" name="fecha_entrega" class="custom-input" required>
                    </div>
                </div>

                <div class="btn-group-flex">
                    <a href="{{ url_for('maestro_dashboard') }}" class="m-btn m-btn-outline">Cancelar</a>
                    <button type="submit" class="m-btn m-btn-success">
                        <i class="bi bi-plus-circle-fill me-2"></i> Publicar Tarea
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>

{% endblock %}
