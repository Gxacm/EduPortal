{% extends 'base.html' %}
{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<style>
:root { --primary-blue:#3b82f6; --dark-text:#0f172a; --muted-text:#64748b; --border-color:#e2e8f0; --bg-soft:#f8fafc; }
body { background-color:var(--bg-soft); font-family:'Plus Jakarta Sans',sans-serif; color:var(--dark-text); }
.viewport-container { padding:40px 20px; }
.top-action-bar { max-width:720px; margin:0 auto 25px; }
.btn-back-top { display:inline-flex; align-items:center; gap:8px; color:var(--muted-text); text-decoration:none; font-weight:600; }
.form-card { background:white; border-radius:28px; padding:3rem; max-width:720px; margin:0 auto; box-shadow:0 10px 40px -10px rgba(0,0,0,.08); }
.form-header { text-align:center; margin-bottom:2rem; }
.form-group { margin-bottom:1.2rem; }
.form-label { font-weight:700; font-size:.8rem; text-transform:uppercase; letter-spacing:.8px; margin-bottom:8px; display:block; color:var(--muted-text); }
.custom-control { width:100%; padding:14px 16px; border-radius:16px; border:2px solid var(--border-color); background:#f8fafc; font:inherit; box-sizing:border-box; }
.custom-control:focus { outline:none; border-color:var(--primary-blue); background:white; box-shadow:0 0 0 4px #dbeafe; }
textarea.custom-control { min-height:120px; resize:vertical; }
.btn-group-flex { display:flex; gap:16px; margin-top:2rem; }
.m-btn { flex:1; padding:15px 24px; border-radius:16px; border:none; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:8px; font-weight:700; }
.m-btn-primary { background:var(--primary-blue); color:white; }
.m-btn-outline { background:white; color:var(--muted-text); border:2px solid var(--border-color); }
</style>
<div class="viewport-container">
    <div class="top-action-bar"><a href="{{ url_for('gestionar_grado', id_grado=id_grado) }}" class="btn-back-top"><i class="bi bi-arrow-left"></i> Volver a Gestion</a></div>
    <div class="form-card">
        <div class="form-header">
            <h2 style="font-weight:800; font-size:1.8rem; margin-bottom:.4rem;">Crear Nueva Tarea</h2>
            <p style="color:var(--muted-text);">Publicando en <strong>{{ grado.nombre_grado }}</strong></p>
        </div>
        <form action="{{ url_for('crear_tarea', id_grado=id_grado) }}" method="POST">
            <div class="form-group"><label class="form-label">Asignatura</label><select name="id_clase" class="custom-control" required><option value="" disabled selected>Selecciona la materia correspondiente...</option>{% for clase in clases %}<option value="{{ clase.id_clase }}">{{ clase.nombre_clase }}</option>{% endfor %}</select></div>
            <div class="form-group"><label class="form-label">Titulo de la Tarea</label><input type="text" name="titulo" class="custom-control" required></div>
            <div class="form-group"><label class="form-label">Descripcion e Instrucciones</label><textarea name="descripcion" class="custom-control"></textarea></div>
            <div class="form-group"><label class="form-label">Periodo</label><select name="periodo" class="custom-control" required><option value="" disabled selected>Selecciona un parcial...</option>{% for periodo in periodos %}<option value="{{ periodo.nombre_periodo }}">{{ periodo.nombre_periodo }}</option>{% endfor %}</select></div>
            <div class="form-group"><label class="form-label">Puntaje Asignado</label><input type="number" name="puntos" class="custom-control" min="0.1" step="0.1" value="100" required></div>
            <div class="form-group"><label class="form-label">Fecha y Hora Limite</label><input type="datetime-local" name="fecha_entrega" class="custom-control" required></div>
            <div class="btn-group-flex"><a href="{{ url_for('gestionar_grado', id_grado=id_grado) }}" class="m-btn m-btn-outline">Cancelar</a><button type="submit" class="m-btn m-btn-primary"><i class="bi bi-check2-circle"></i> Publicar Tarea</button></div>
        </form>
    </div>
</div>
{% endblock %}
