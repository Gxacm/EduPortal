{% extends 'base.html' %}
{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<style>
:root { --primary-main:#3b82f6; --primary-soft:#eff6ff; --dark-text:#1e293b; --muted-text:#64748b; --bg-soft:#f8fafc; --border-color:#e2e8f0; }
body { background-color:var(--bg-soft); font-family:'Plus Jakarta Sans',sans-serif; }
.viewport-container { padding:30px 20px; max-width:800px; margin:0 auto; }
.btn-back-nav { display:inline-flex; align-items:center; gap:8px; color:var(--muted-text); text-decoration:none; font-weight:700; margin-bottom:20px; }
.form-card { background:white; border-radius:24px; padding:2rem; border:1px solid var(--border-color); box-shadow:0 4px 6px -1px rgba(0,0,0,.05); }
.custom-label { font-weight:700; color:var(--dark-text); font-size:.9rem; margin-bottom:8px; display:block; }
.custom-input { width:100%; padding:12px 16px; border-radius:12px; border:1px solid var(--border-color); background-color:#f8fafc; font-family:inherit; color:var(--dark-text); box-sizing:border-box; }
.btn-submit { background-color:var(--primary-main); color:white; padding:12px 24px; border-radius:16px; border:none; font-weight:700; width:100%; }
</style>
<div class="viewport-container">
<a href="{{ url_for('vista_nuevo_examen', id_grado=id_grado) }}" class="btn-back-nav"><i class="bi bi-chevron-left"></i> Volver a opciones</a>
<div class="form-card"><form action="{{ url_for('examen_archivo', id_grado=id_grado) }}" method="POST" enctype="multipart/form-data">
<div style="margin-bottom:20px;"><label class="custom-label">Materia / Clase</label><select name="id_clase" class="custom-input" required><option value="" disabled selected>Selecciona la materia...</option>{% for clase in clases %}<option value="{{ clase.id_clase }}">{{ clase.nombre_clase }}</option>{% endfor %}</select></div>
<div style="margin-bottom:20px;"><label class="custom-label">Titulo del Examen</label><input type="text" name="titulo" class="custom-input" required></div>
<div style="margin-bottom:20px;"><label class="custom-label">Descripcion</label><textarea name="descripcion" class="custom-input" rows="3"></textarea></div>
<div style="margin-bottom:20px;"><label class="custom-label">Periodo</label><select name="periodo" class="custom-input" required><option value="" disabled selected>Selecciona un parcial...</option>{% for periodo in periodos %}<option value="{{ periodo.nombre_periodo }}">{{ periodo.nombre_periodo }}</option>{% endfor %}</select></div>
<div style="margin-bottom:20px;"><label class="custom-label">Subir Documento</label><input type="file" name="archivo" class="custom-input" style="background:white; padding:10px;" required></div>
<div style="display:flex; gap:20px; margin-bottom:30px;"><div style="flex:1;"><label class="custom-label">Fecha y Hora Limite</label><input type="datetime-local" name="fecha_limite" class="custom-input" required></div><div style="flex:1;"><label class="custom-label">Puntaje Maximo</label><input type="number" step="0.1" name="puntos_maximos" class="custom-input" required></div></div>
<button type="submit" class="btn-submit">Publicar Examen</button></form></div></div>
{% endblock %}
