{% extends 'base.html' %}
{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<style>
    :root {
        --primary-main: #3b82f6; --primary-soft: #eff6ff;
        --dark-text: #1e293b; --muted-text: #64748b;
        --bg-soft: #f8fafc; --border-color: #e2e8f0;
    }
    body { background-color: var(--bg-soft); font-family: 'Plus Jakarta Sans', sans-serif; }
    .viewport-container { padding: 30px 20px; max-width: 800px; margin: 0 auto; }
    
    .btn-back-nav { display: inline-flex; align-items: center; gap: 8px; color: var(--muted-text); text-decoration: none; font-weight: 700; margin-bottom: 20px; transition: 0.3s; }
    .btn-back-nav:hover { color: var(--dark-text); transform: translateX(-5px); }

    .form-card { background: white; border-radius: 24px; padding: 2rem; border: 1px solid var(--border-color); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    
    .custom-label { font-weight: 700; color: var(--dark-text); font-size: 0.9rem; margin-bottom: 8px; display: block; }
    .custom-input { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border-color); background-color: #f8fafc; font-family: inherit; color: var(--dark-text); transition: all 0.2s; }
    .custom-input:focus { outline: none; border-color: var(--primary-main); background-color: white; box-shadow: 0 0 0 4px var(--primary-soft); }
    
    .btn-submit { background-color: var(--primary-main); color: white; padding: 12px 24px; border-radius: 50px; border: none; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.2s; width: 100%; margin-top: 10px; }
    .btn-submit:hover { background-color: #2563eb; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3); }
</style>

<div class="viewport-container">
    <a href="{{ url_for('vista_nuevo_examen', id_grado=id_grado) }}" class="btn-back-nav">
        <i class="bi bi-chevron-left"></i> Volver a opciones
    </a>

    <div class="form-card">
        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color);">
            <div style="width: 50px; height: 50px; background: var(--primary-soft); color: var(--primary-main); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                <i class="bi bi-cloud-arrow-up-fill"></i>
            </div>
            <div>
                <h2 style="margin: 0; font-weight: 800; color: var(--dark-text); font-size: 1.4rem;">Examen por Archivo</h2>
                <p style="margin: 0; color: var(--muted-text); font-size: 0.9rem;">Sube un PDF o Word para tus alumnos.</p>
            </div>
        </div>

        <form action="{{ url_for('examen_archivo', id_grado=id_grado) }}" method="POST" enctype="multipart/form-data">
            <div style="margin-bottom: 20px;">
                <label class="custom-label">Título del Examen</label>
                <input type="text" name="titulo" class="custom-input" placeholder="Ej: Examen Parcial de Matemáticas" required>
            </div>
            
            <div style="margin-bottom: 20px;">
                <label class="custom-label">Descripción (Opcional)</label>
                <textarea name="descripcion" class="custom-input" rows="3" placeholder="Instrucciones breves para resolver el archivo..."></textarea>
            </div>

            <div style="margin-bottom: 20px;">
                <label class="custom-label">Subir Documento (PDF, Word)</label>
                <input type="file" name="archivo" class="custom-input" style="background: white; padding: 10px;" required>
            </div>

            <div style="display: flex; gap: 20px; margin-bottom: 30px;">
                <div style="flex: 1;">
                    <label class="custom-label">Fecha y Hora Límite</label>
                    <input type="datetime-local" name="fecha_limite" class="custom-input" required>
                </div>
                <div style="flex: 1;">
                    <label class="custom-label">Puntaje Máximo</label>
                    <input type="number" name="puntos" class="custom-input" placeholder="Ej: 100" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">Publicar Examen</button>
        </form>
    </div>
</div>
{% endblock %}
