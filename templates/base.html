<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduControl</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='imagenes/uni.png') }}">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary: #4318ff;
            --dark: #2b3674;
            --muted: #a3aed0;
            --bg: #f4f7fe;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
        }

        /* --- TOP NAVBAR --- */
        .top-navbar {
            height: 75px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
        }

        .navbar-left, .navbar-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .brand-text {
            font-weight: 800; 
            color: var(--dark); 
            margin-right: 15px; 
            letter-spacing: -0.5px;
            text-decoration: none;
        }

        .search-bar-container {
            background: var(--bg);
            padding: 10px 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 250px;
            transition: 0.3s;
        }
        .search-bar-container input {
            border: none; background: transparent; outline: none;
            width: 100%; font-weight: 600; color: var(--dark);
        }

        /* Botón de Gestión (Corregido con vista) */
        .nav-link-admin {
            text-decoration: none;
            color: var(--dark);
            font-weight: 700;
            font-size: 0.85rem;
            padding: 10px 18px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .nav-link-admin:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        .status-badge {
            background: white; padding: 8px 15px; border-radius: 12px;
            font-size: 0.8rem; font-weight: 700; color: var(--primary);
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .profile-trigger {
            display: flex; align-items: center; gap: 10px;
            cursor: pointer; padding: 5px 10px; border-radius: 15px;
            transition: 0.2s;
        }
        .profile-trigger:hover { background: rgba(255,255,255,0.5); }

        .avatar-img {
            width: 40px; height: 40px; border-radius: 12px;
            background: var(--primary); color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 0.9rem;
        }

        .dropdown-menu {
            position: absolute; top: 80px; right: 30px;
            background: white; width: 220px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            display: none; flex-direction: column; padding: 10px;
            animation: slideDown 0.3s ease-out;
            border: 1px solid #f1f5f9;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .dropdown-item {
            padding: 12px 15px; text-decoration: none; color: var(--dark);
            font-size: 0.85rem; font-weight: 600; border-radius: 12px;
            display: flex; align-items: center; gap: 10px;
            transition: 0.2s;
        }
        .dropdown-item:hover { background: var(--bg); color: var(--primary); }
        .dropdown-item.danger { color: var(--danger); }

        .content-wrapper {
            margin-top: 75px;
            padding: 20px;
        }
    </style>
</head>
<body>

    <nav class="top-navbar">
        <div class="navbar-left">
            <a href="{{ url_for('admin_dashboard') if session.rol == 1 else url_for('login') }}" class="brand-text">EDU CONTROL</a>
            
            <div class="search-bar-container">
                <i class="bi bi-search" style="color: var(--muted);"></i>
                <input type="text" placeholder="Búsqueda global...">
            </div>
        </div>

        <div class="navbar-right">
            <div class="status-badge">
                <i class="bi bi-calendar-check" style="margin-right: 5px;"></i> 
                Ciclo <span id="year-automatico"></span>
            </div>

            <div class="profile-trigger" id="profileBtn">
                <div style="text-align: right; line-height: 1;">
                    <div style="font-weight: 800; color: var(--dark); font-size: 0.85rem;">
                        {{ session.nombre }}
                    </div>
                    <small style="color: var(--muted); font-size: 0.7rem; font-weight: 600;">
                        {{ session.rol_nombre }}
                    </small>
                </div>
                <div class="avatar-img">{{ session.iniciales }}</div>
            </div>

            <div class="dropdown-menu" id="profileMenu">
                <div style="padding: 10px 15px; border-bottom: 1px solid #f1f5f9; margin-bottom: 5px;">
                    <p style="margin:0; font-size: 0.65rem; font-weight: 800; color: var(--muted); text-transform: uppercase;">Mi Cuenta</p>
                </div>
                <a href="{{ url_for('mi_cuenta') }}" class="dropdown-item">
                    <i class="bi bi-person-circle"></i> Mi Perfil
                </a>
                <a href="#" class="dropdown-item">
                    <i class="bi bi-gear-fill"></i> Ajustes
                </a>
                <hr style="border: 0; border-top: 1px solid #f1f5f9; margin: 8px 0;">
                <a href="{{ url_for('logout') }}" class="dropdown-item danger">
                    <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
                </a>
            </div>
        </div>
    </nav>

    <div class="content-wrapper">
        {% block content %}{% endblock %}
    </div>

    <script>
        document.getElementById('year-automatico').innerText = new Date().getFullYear();

        const profileBtn = document.getElementById('profileBtn');
        const profileMenu = document.getElementById('profileMenu');

        profileBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            profileMenu.style.display = profileMenu.style.display === 'flex' ? 'none' : 'flex';
        });

        document.addEventListener('click', () => {
            profileMenu.style.display = 'none';
        });

        profileMenu.addEventListener('click', (e) => {
            e.stopPropagation();
        });
    </script>
</body>
</html>
