<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPortal</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='imagenes/uni.png') }}">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Fredoka:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='responsive.css') }}">
    
    <style>
    :root {
        /* 1. COLORES POR ROL (DINÁMICOS) */
        {% if session.rol == 1 %}
            --brand-color: #ef4444; 
            --brand-color-rgb: 239, 68, 68;
        {% elif session.rol == 2 %}
            --brand-color: #22c55e; 
            --brand-color-rgb: 34, 197, 94;
        {% elif session.rol == 3 %}
            --brand-color: #4318ff; 
            --brand-color-rgb: 67, 24, 255;
        {% else %}
            --brand-color: #64748b;
            --brand-color-rgb: 100, 116, 139;
        {% endif %}

        /* 2. VARIABLES MODO CLARO */
        --bg-body: #f4f7fe;
        --bg-card: #ffffff;
        --bg-sidebar: #ffffff;
        --bg-input: #f4f7fe;
        --text-main: #1b2559;
        --text-muted: #a3aed0;
        --border-color: #edf2f7;
        --hover-neutral: #f1f5f9;
        --shadow: rgba(0, 0, 0, 0.05);
        
        --white: #ffffff;
        --danger: #ff4757;
        --accent-fun: #ff9922;
    }

    /* 3. MODO OSCURO (OVERRIDE) */
    .dark-mode {
        --bg-body: #0b1437;
        --bg-card: #111c44;
        --bg-sidebar: #1b254b;
        --bg-input: #0b1437;
        --text-main: #ffffff;
        --text-muted: #8f9bba;
        --border-color: #1b254b;
        --hover-neutral: #1b2559;
        --shadow: rgba(0, 0, 0, 0.3);
    }

    body {
        margin: 0; padding: 0;
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: var(--bg-body);
        color: var(--text-main);
        transition: background 0.3s ease, color 0.3s ease;
    }

    /* NAVBAR CORREGIDA PARA MODO OSCURO */
    .top-navbar {
        height: 75px;
        background: var(--bg-card);
        border-bottom: 2px solid var(--border-color);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 40px;
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 1000;
        transition: 0.3s;
    }

    .brand-text { font-family: 'Fredoka', sans-serif; font-size: 1.8rem; display: flex; align-items: center; }
    .text-edu { color: var(--text-main); font-weight: 700; }
    .text-portal { color: var(--brand-color); font-weight: 500; }
    
    /* EFECTO HOVER PARA EL LOGO */
    .brand-link:hover .o-graduation {
        transform: rotate(-12deg) scale(1.1); /* Inclinación juguetona */
    }

    .brand-link:hover .o-tassel {
        transform: rotate(20deg);
        transition: 0.3s;
    }
    /* Asegúrate de que la transición esté en la clase base para que sea suave */
    .o-graduation { 
        width: 26px; 
        height: 26px; 
        margin: 0 2px; 
        position: relative; 
        display: inline-flex; 
        align-items: center; 
        justify-content: center; 
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); /* Efecto rebote */
    }

    /* COMPONENTES DINÁMICOS */
    .ciclo-label {
        background: var(--bg-input);
        padding: 6px 14px;
        border-radius: 10px;
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--text-main);
        border: 1px solid var(--border-color);
    }

    .avatar {
        width: 40px; height: 40px;
        border-radius: 10px;
        background: var(--brand-color);
        color: white;
        display: flex; align-items: center; justify-content: center;
        font-weight: 800;
        box-shadow: 0 4px 10px var(--shadow);
    }

    .menu-dropdown {
        position: absolute; 
        top: 85px; 
        right: 40px;
        background: var(--bg-card); 
        width: 210px;
        border-radius: 18px; 
        border: 1px solid var(--border-color);
        box-shadow: 0 15px 35px var(--shadow);
        padding: 10px;
        display: flex; 
        flex-direction: column;        
        opacity: 0;
        visibility: hidden;
        transform: translateY(-10px) scale(0.95); 
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
        pointer-events: none; 
        z-index: 1100;
    }

    /* CLASE PARA MOSTRARLO */
    .menu-dropdown.show {
        opacity: 1;
        visibility: visible;
        transform: translateY(0) scale(1); 
        pointer-events: auto;
    }

    .menu-item {
        padding: 12px 15px; text-decoration: none; color: var(--text-main);
        font-weight: 600; font-size: 0.85rem; border-radius: 10px;
        display: flex; align-items: center; gap: 10px;
    }

    .menu-item:hover { background: var(--hover-neutral); }
    .logout-item { color: var(--danger) !important; }
    .logout-item:hover { background: #fee2e2;  color: #ef4444;}

    .main-content { margin-top: 75px; padding: 30px; min-height: calc(100dvh - 75px); }

    /* Clases de apoyo */
    .navbar-left, .navbar-right { display: flex; align-items: center; gap: 25px; }
    .mobile-nav-toggle {
        display: none;
        width: 42px;
        height: 42px;
        border: 1px solid var(--border-color);
        border-radius: 12px;
        background: var(--bg-input);
        color: var(--text-main);
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        cursor: pointer;
    }
    .profile-trigger { display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 5px 10px; border-radius: 12px; transition: 0.2s; }
    .profile-trigger:hover { background: var(--hover-neutral); }
    .user-info { text-align: right; line-height: 1.2; }
    .user-name { display: block; font-weight: 800; font-size: 0.85rem; color: var(--text-main); }
    .user-role-badge { font-size: 0.65rem; font-weight: 700; color: var(--brand-color); text-transform: uppercase; }
    
    /* LOGO ICON */
    .o-graduation { width: 26px; height: 26px; margin: 0 2px; position: relative; display: inline-flex; align-items: center; justify-content: center; transition: 0.3s; }
    .o-shape { width: 100%; height: 100%; background: var(--brand-color); clip-path: polygon(50% 0%, 100% 30%, 100% 45%, 85% 45%, 85% 85%, 15% 85%, 15% 45%, 0% 45%, 0% 30%); border-radius: 0 0 50% 50%; }
    .o-inner { position: absolute; width: 10px; height: 8px; background: rgba(255,255,255,0.8); bottom: 5px; border-radius: 50%; }
    .o-tassel { position: absolute; right: -2px; top: 30%; width: 3px; height: 11px; background: var(--accent-fun); border-radius: 2px; }

    @media (max-width: 900px) {
        .top-navbar {
            position: sticky;
            height: auto;
            padding: 14px 16px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .navbar-left {
            flex: 1;
            min-width: 0;
            gap: 12px;
            flex-wrap: wrap;
        }

        .mobile-nav-toggle {
            display: inline-flex;
            margin-left: auto;
        }

        .navbar-right {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: stretch;
            gap: 12px;
        }

        .top-navbar.nav-open .navbar-right {
            display: flex;
        }

        .search-input {
            width: 100%;
        }

        .profile-trigger {
            justify-content: space-between;
        }

        .menu-dropdown {
            right: 16px;
            top: calc(100% + 10px);
            width: min(240px, calc(100vw - 32px));
        }

        .main-content {
            margin-top: 0;
            padding: 20px 16px 28px;
            min-height: auto;
        }
    }

    @media (max-width: 640px) {
        .brand-text { font-size: 1.45rem; }
        .ciclo-label { width: 100%; }
        .user-info { text-align: left; }
    }
    </style>
</head>
<body>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('edu-theme');
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>

    <nav class="top-navbar">
        <div class="navbar-left">
            <a href="{% if session.rol == 1 %}{{ url_for('admin_dashboard') }}
                     {% elif session.rol == 2 %}{{ url_for('maestro_dashboard') }}
                     {% elif session.rol == 3 %}{{ url_for('alumno_dashboard') }}{% endif %}" 
               class="brand-link" style="text-decoration: none;">
                <div class="brand-text">
                    <span class="text-edu">EDU</span>
                    <span class="text-portal">
                        p<div class="o-graduation"><div class="o-shape"></div><div class="o-inner"></div><div class="o-tassel"></div></div>rtal
                    </span>
                </div>
            </a>

            <div class="ciclo-label">
                <i class="bi bi-calendar-event" style="margin-right: 5px;"></i> {{ ciclo_actual_global }}
            </div>
        </div>

        <button type="button" class="mobile-nav-toggle" id="mobileNavToggle" aria-label="Abrir menú">
            <i class="bi bi-list"></i>
        </button>

        <div class="navbar-right">
        
            <div class="profile-trigger" id="profileBtn">
                <div class="user-info">
                    <span class="user-name">{{ session.nombre }}</span>
                    <span class="user-role-badge">{{ session.rol_nombre }}</span>
                </div>
                <div class="avatar">{{ session.iniciales }}</div>
            </div>

            <div class="menu-dropdown" id="profileMenu">
                {% if session.rol in [2, 3] %}
                    <a href="{{ url_for('mi_cuenta') }}" class="menu-item">
                        <i class="bi bi-person-circle"></i> Mi Perfil
                    </a>
                {% endif %}

                <a href="{{ url_for('ajustes') }}" class="menu-item">
                    <i class="bi bi-gear-fill"></i> Ajustes
                </a>
                
                <hr style="margin: 5px 0; border: 0; border-top: 1px solid var(--border-color);">
                
                <a href="{{ url_for('logout') }}" class="menu-item logout-item">
                    <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
                </a>
            </div>
        </div>
    </nav>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <script>
    const profileBtn = document.getElementById('profileBtn');
    const profileMenu = document.getElementById('profileMenu');
    const mobileNavToggle = document.getElementById('mobileNavToggle');
    const topNavbar = document.querySelector('.top-navbar');

    // Función centralizada para cerrar
    const closeMenu = () => {
        profileMenu.classList.remove('show');
    };

    // Toggle con stopPropagation para que el clic en el botón no sea detectado por el document
    profileBtn.onclick = (e) => {
        e.stopPropagation();
        profileMenu.classList.toggle('show');
    };

    // Cerrar al hacer clic en cualquier parte (document)
    document.addEventListener('click', closeMenu);

    // Evitar que clics dentro del menú lo cierren (a menos que sea en un link)
    profileMenu.onclick = (e) => e.stopPropagation();

    // Cerrar al elegir una opción para que no esté abierto al regresar
    document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', closeMenu);
    });

    // Asegurar que esté cerrado al cargar la página (botón atrás)
    window.onpageshow = (event) => {
        closeMenu();
    };

    if (mobileNavToggle && topNavbar) {
        mobileNavToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            topNavbar.classList.toggle('nav-open');
        });

        window.addEventListener('resize', () => {
            if (window.innerWidth > 900) {
                topNavbar.classList.remove('nav-open');
            }
        });
    }

    document.addEventListener('click', (event) => {
        if (topNavbar && !topNavbar.contains(event.target)) {
            topNavbar.classList.remove('nav-open');
        }
    });
</script>
</body>
</html>
